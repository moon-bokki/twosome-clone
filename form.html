<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>login form</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="root-byensu.css" />
    <link rel="stylesheet" href="output.css" />
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <!-- <form action="form.html"></form> -->

  <header class="header">
    <span class="logo-btn"><img src="home-icon.png" /></span>
    <span class="logo-text"><h3>로그인</h3></span>
  </header>

  <body>
    <div class="flex justify-center items-center bg-black-50 h-80">
      <img src="login-ts.png" />
    </div>
    <br /><br />

    <section
      class="flex items-center justify-between bg-white round-lg p-3 mb-3"
    >
      <h5 class="cursor-pointer">아이디 입력</h5>
      <img src="QQQ.png" />
    </section>
    <br /><br /><br />
    <section
      class="flex items-center justify-between bg-white round-lg p-3 mb-3"
    >
      <h5>비밀번호 입력</h5>
      <img src="eye.png" />
    </section>
    <br /><br /><br />

    <span
      >정보 보호를 위해 아이디, 비밀번호와 함께 자동 입력 방지 문자를 입력해
      주세요.</span
    ><br /><br /><br /><br />

    <div class="flex gap-4">
      <div class="w-[500px] h-[80px] bg-green-100 p-4 border">
        <img src="sc-num.png" />
      </div>

      <!-- 2번 박스 -->
      <div
        class="w-[140px] h-[80px] bg-green-100 p-2 border flex flex-col gap-2"

        <div class="bg-white flex-1 p-2">
          <img src="new.png" class="cursor-pointer" />
        </div>
        <div class="bg-white flex-1 p-2">
          <img src="audio.png" class="cursor-pointer" />
        </div>
      </div>
    </div>
    <br /><br />
    <span>자동 입력 방지 문자 입력</span>
    <br /><br />
    <hr class="border-gray-300" />

    <div>
      <a
        href="#"
        class="block w-full h-[50px] bg-black text-white flex justify-center items-center border"
      >
        로그인
      </a>
    </div>
